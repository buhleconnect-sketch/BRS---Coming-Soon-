<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Ridge Solutions — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2c5b;
      --navy-dark: #0f1c3d;
      --navy-mid: #2a3f7a;
      --blue-accent: #3a6fd8;
      --light: #f4f6fb;
      --white: #ffffff;
      --gray: #8899bb;
      --border: rgba(26,44,91,0.12);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Barlow', sans-serif;
      background: var(--light);
      color: var(--navy);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* ─── BACKGROUND LAYOUT ─── */
    .container {
      width: 100%;
      max-width: 800px;
      padding: 40px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ─── BRANDING ─── */
    .logo-container {
      margin-bottom: 40px;
    }

    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: 2px;
      color: var(--navy-dark);
      text-transform: uppercase;
      border-bottom: 2px solid var(--blue-accent);
      padding-bottom: 10px;
      display: inline-block;
    }

    /* ─── MESSAGING ─── */
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--blue-accent);
      margin-bottom: 16px;
    }

    p.subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-style: italic;
      color: var(--navy-mid);
      max-width: 500px;
      margin-bottom: 48px;
      line-height: 1.6;
    }

    /* ─── TIMER LAYOUT ─── */
    .countdown-container {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .time-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      min-width: 100px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(26,44,91,0.04);
    }

    .time-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--navy-dark);
      line-height: 1;
      margin-bottom: 4px;
    }

    .time-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gray);
      font-weight: 600;
    }

    /* ─── FOOTER ─── */
    footer {
      font-size: 0.85rem;
      letter-spacing: 1px;
      color: var(--gray);
      margin-top: 24px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <div class="logo-text">Blue Ridge Solutions</div>
    </div>

    <h1>Coming Soon</h1>
    <p class="subtitle">Our professional digital home is currently under development. We are preparing to launch our full corporate platform soon.</p>

    <div class="countdown-container">
      <div class="time-box">
        <div class="time-number" id="days">00</div>
        <div class="time-label">Days</div>
      </div>
      <div class="time-box">
        <div class="time-number" id="hours">00</div>
        <div class="time-label">Hours</div>
      </div>
      <div class="time-box">
        <div class="time-number" id="minutes">00</div>
        <div class="time-label">Mins</div>
      </div>
      <div class="time-box">
        <div class="time-number" id="seconds">00</div>
        <div class="time-label">Secs</div>
      </div>
    </div>

    <footer>&copy; 2026 Blue Ridge Solutions. All Rights Reserved.</footer>
  </div>

  <script>
    function updateCountdown() {
      // Sets countdown deadline to midnight beginning July 6, 2026
      const targetDate = new Date("July 6, 2026 00:00:00").getTime();
      const now = new Date().getTime();
      const timeRemaining = targetDate - now;

      if (timeRemaining <= 0) {
        document.getElementById("days").innerText = "00";
        document.getElementById("hours").innerText = "00";
        document.getElementById("minutes").innerText = "00";
        document.getElementById("seconds").innerText = "00";
        return;
      }

      // Calculation matrices for temporal blocks
      const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
      const hours = Math.floor((timeRemaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);

      // DOM Node Injection with string padding
      document.getElementById("days").innerText = String(days).padStart(2, '0');
      document.getElementById("hours").innerText = String(hours).padStart(2, '0');
      document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
      document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
    }

    // Initialize and sync clock ticks every 1000ms
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
